600;\">Lò than tách khói · Lò xông khói · Thủ công Việt Nam<\u002Fspan>\n      <\u002Fdiv>\n      <h1 style=\"margin: 0; font-family: 'Oswald', sans-serif; font-weight: 600; font-size: clamp(46px, 5vw, 74px); line-height: 1.02; letter-spacing: .01em; text-transform: uppercase;\">\n        Nướng than đúng vị.<br>\n        <span style=\"color: #F47B20;\">Tách khói<\u002Fspan> khỏi mẻ nướng.\n      <\u002Fh1>\n      <p style=\"margin: 0; max-width: 500px; font-size: 16.5px; line-height: 1.68; color: rgba(245,243,239,.66); text-wrap: pretty;\">\n        Duy's Oven chế tác lò than tách khói và lò xông khói offset chuẩn Texas — mỡ không chạm than, khói khét bị chặn từ gốc. Từ chiếc lò gập gọn mang đi tới lò thép 100kg nấu low &amp; slow.\n      <\u002Fp>\n      <div style=\"display: flex; gap: 14px; margin-top: 4px; flex-wrap: wrap;\">\n        <a href=\"#san-pham\" style=\"background: #F47B20; color: #0A0A0B; text-decoration: none; font-weight: 700; font-size: 15px; padding: 15px 32px; border-radius: 12px; transition: background .15s, transform .15s;\" style-hover=\"background: #FF8F3D; transform: translateY(-1px);\">Xem sản phẩm<\u002Fa>\n        <a href=\"#dat-hang\" style=\"border: 1px solid rgba(255,255,255,.22); color: #F5F3EF; text-decoration: none; font-weight: 600; font-size: 15px; padding: 15px 32px; border-radius: 12px; transition: border-color .15s;\" style-hover=\"border-color: #F47B20;\">Đặt hàng<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-wrap: wrap; gap: 14px 0; margin-top: 22px; border-top: 1px solid rgba(255,255,255,.1); padding-top: 22px;\">\n        <div style=\"flex: 1; min-width: 110px; display: flex; flex-direction: column; gap: 2px;\">\n          <span style=\"font-family: 'Oswald', sans-serif; font-size: 26px; font-weight: 600; color: #F47B20;\">2018<\u002Fspan>\n          <span style=\"font-size: 11px; letter-spacing: .08em; color: rgba(245,243,239,.5); text-transform: uppercase;\">Năm thành lập<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"flex: 1; min-width: 110px; display: flex; flex-direction: column; gap: 2px; border-left: 1px solid rgba(255,255,255,.1); padding-left: 20px;\">\n          <span style=\"font-family: 'Oswald', sans-serif; font-size: 26px; font-weight: 600;\">4 lò<\u002Fspan>\n          <span style=\"font-size: 11px; letter-spacing: .08em; color: rgba(245,243,239,.5); text-transform: uppercase;\">Dòng sản phẩm<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"flex: 1; min-width: 110px; display: flex; flex-direction: column; gap: 2px; border-left: 1px solid rgba(255,255,255,.1); padding-left: 20px;\">\n          <span style=\"font-family: 'Oswald', sans-serif; font-size: 26px; font-weight: 600;\">100%<\u002Fspan>\n          <span style=\"font-size: 11px; letter-spacing: .08em; color: rgba(245,243,239,.5); text-transform: uppercase;\">Thủ công Việt Nam<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"flex: 1; min-width: 110px; display: flex; flex-direction: column; gap: 2px; border-left: 1px solid rgba(255,255,255,.1); padding-left: 20px;\">\n          <span style=\"font-family: 'Oswald', sans-serif; font-size: 26px; font-weight: 600;\">Toàn quốc<\u002Fspan>\n          <span style=\"font-size: 11px; letter-spacing: .08em; color: rgba(245,243,239,.5); text-transform: uppercase;\">Giao tận nơi<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position: relative; min-height: 540px; display: flex; align-items: center; justify-content: center; padding: clamp(20px, 3vw, 40px);\">\n      <div style=\"position: absolute; inset: 0; background: radial-gradient(ellipse 62% 46% at 50% 72%, rgba(244,123,32,.18), transparent 70%);\"><\u002Fdiv>\n      <div style=\"position: absolute; top: 44%; left: 50%; transform: translate(-50%, -50%); font-family: 'Oswald', sans-serif; font-weight: 700; font-size: clamp(170px, 22vw, 320px); line-height: 1; color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,.07); user-select: n      <div style=\"display: flex; flex-direction: column; gap: 14px; max-width: 720px;\">\n        <span style=\"font-size: 11.5px; letter-spacing: .24em; text-transform: uppercase; color: #F47B20; font-weight: 700;\">Một triết lý nấu<\u002Fspan>\n        <h2 style=\"margin: 0; font-family: 'Oswald', sans-serif; font-weight: 600; font-size: clamp(29px, 4.4vw, 44px); line-height: 1.1; text-transform: uppercase;\">Mỡ không chạm than. Khói khét bị chặn từ gốc.<\u002Fh2>\n        <p style=\"margin: 0; font-size: 16px; line-height: 1.7; color: rgba(245,243,239,.62); text-wrap: pretty;\">Khói khét sinh ra khi mỡ rơi vào than. Mọi chiếc lò Duy's Oven đều giải quyết đúng chỗ đó — để miếng thịt sạch vị, người đứng nướng không cay mắt, nhà cửa không ám mùi.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 300px), 1fr)); gap: 18px;\">\n        <div style=\"background: #141417; border: 1px solid rgba(255,255,255,.08); border-radius: 18px; padding: 30px; display: flex; flex-direction: column; gap: 12px;\">\n          <span style=\"font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 26px; color: #F47B20;\">01<\u002Fspan>\n          <h3 style=\"margin: 0; font-size: 18px; font-weight: 700;\">Tách khói tận gốc<\u002Fh3>\n          <p style=\"margin: 0; font-size: 14px; line-height: 1.62; color: rgba(245,243,239,.58); text-wrap: pretty;\">Vỉ tách dầu hoặc hộc than đặt lệch hứng toàn bộ mỡ chảy xuống. Mỡ không bao giờ chạm than — không bùng lửa, không khói đen ám lên thịt.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: #141417; border: 1px solid rgba(255,255,255,.08); border-radius: 18px; padding: 30px; display: flex; flex-direction: column; gap: 12px;\">\n          <span style=\"font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 26px; color: #F47B20;\">02<\u002Fspan>\n          <h3 style=\"margin: 0; font-size: 18px; font-weight: 700;\">Nhiệt đối lưu đều<\u002Fh3>\n          <p style=\"margin: 0; font-size: 14px; line-height: 1.62; color: rgba(245,243,239,.58); text-wrap: pretty;\">Quạt gió cưỡng bức hoặc khoang đốt offset dẫn nhiệt đi đường vòng, bao trọn miếng thịt trong dòng khí nóng — chín đều, không phải trở vỉ liên tục.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: #141417; border: 1px solid rgba(255,255,255,.08); border-radius: 18px; padding: 30px; display: flex; flex-direction: column; gap: 12px;\">\n          <span style=\"font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 26px; color: #F47B20;\">03<\u002Fspan>\n          <h3 style=\"margin: 0; font-size: 18px; font-weight: 700;\">Thép thật, lửa thật<\u002Fh3>\n          <p style=\"margin: 0; font-size: 14px; line-height: 1.62; color: rgba(245,243,239,.58); text-wrap: pretty;\">Không bếp gas giả khói, không nồi điện. Thân sắt sơn chịu nhiệt, vỉ inox tiếp xúc thực phẩm — chế tác thủ công, cân chỉnh giữ nhiệt ổn định cả buổi nấu dài.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== SAN PHAM ===== -->\n  <section id=\"san-pham\" style=\"padding: clamp(64px, 9vw, 110px) clamp(20px, 5vw, 64px); background: #0E0E10; border-top: 1px solid rgba(255,255,255,.07);\">\n    <div style=\"max-width: 1280px; margin: 0 auto; display: flex; flex-direction: column; gap: 42px;\">\n      <div style=\"display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap;\">\n        <div style=\"display: flex; flex-direction: column; gap: 14px; max-width: 720px;\">\n          <span style=\"font-size: 11.5px; letter-spacing: .24em; text-transform: uppercase; color: #F47B20; font-weight: 700;\">Bộ sưu tập<\u002Fspan>\n          <h2 style=\"margin: 0; font-family: 'Oswald', sans-serif; font-weight: 600; font-size: clamp(29px, 4.4vw, 44px); line-height: 1.1; text-transform: uppercase;\">Bốn cỗ lò, một chuẩn khói sạch<\u002Fh2>\n          <p style=\"margin: 0; font-size: 16px; line-height: 1.65; color: rgba(245,243,239,.62); text-wrap: pretty;\">Từ lò tách khói gập gọn cho ban công, tới lò xông khói offset cho cả bàn tiệc — chọn cỗ lò hợp với cách bạn nướng.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 300px), 1fr)); gap: 20px;\">\n\n        <!-- TK65L -->\n        <a href=\"san-pham-tach-khoi-65l.html\" style=\"text-decoration: none; color: inherit; background: #141417; border: 1px solid rgba(255,255,255,.1); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; transition: border-color .18s, transform .18s;\" style-hover=\"border-color: rgba(244,123,32,.55); transform: translateY(-3px);\">\n          <div style=\"position: relative; height: 200px; background: radial-gradient(ellipse 80% 80% at 50% 90%, rgba(244,123,32,.16), #1a1714); display: flex; align-items: center; justify-content: center; overflow: hidden;\">\n            <span style=\"font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 92px; color: transparent; -webkit-text-stroke: 1px rgba(244,123,32,.35); line-height: 1;\">65L<\u002Fspan>\n            <span style=\"position: absolute; top: 14px; left: 16px; font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: rgba(245,243,239,.5); border: 1px solid rgba(255,255,255,.14); border-radius: 99px; padding: 5px 11px;\">Lò để bàn<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding: 24px; display: flex; flex-direction: column; gap: 12px; flex: 1;\">\n            <h3 style=\"margin: 0; font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 22px; letter-spacing: .04em;\">TK65L · LÒ THAN TÁCH KHÓI<\u002Fh3>\n            <p style=\"margin: 0; font-size: 13.5px; line-height: 1.6; color: rgba(245,243,239,.58); text-wrap: pretty;\">Than cháy ở hai bên hông, mỡ rơi xuống khay giữa, quạt 7W thổi nhiệt đối lưu đều khắp khoang 65L. Ống khói hút sạch phần khói còn lại.<\u002Fp>\n            <div style=\"display: flex; flex-wrap: wrap; gap: 7px; margin-top: 2px;\">\n              <span style=\"font-size: 11px; font-weight: 600; color: #F47B20; background: rgba(244,123,32,.12); border: 1px solid rgba(244,123,32,.3); border-radius: 99px; padding: 4px 11px;\">65 L<\u002Fspan>\n              <span style=\"font-size: 11px; font-weight: 600; color: #F47B20; background: rgba(244,123,32,.12); border: 1px solid rgba(244,123,32,.3); border-radius: 99px; padding: 4px 11px;\">Vỉ 55×37cm<\u002Fspan>\n              <span style=\"font-size: 11px; font-weight: 600; color: #F47B20; background: rgba(244,123,32,.12); border: 1px solid rgba(244,123,32,.3); border-radius: 99px; padding: 4px 11px;\">Quạt 7W<\u002Fspan>\n            <\u002Fdiv>\n            <span style=\"margin-top: auto; padding-top: 8px; font-size: 13px; font-weight: 700; color: #F47B20;\">Xem chi tiết →<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fa>\n\n        <!-- PANTINA -->\n        <a href=\"sp-pantina.html\" style=\"text-decoration: none; color: inherit; background: #141417; border: 1px solid rgba(255,255,255,.1); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; transition: border-color .18s, transform .18s;\" style-hover=\"border-color: rgba(244,123,32,.55); transform: translateY(-3px);\">\n          <div style=\"position: relative; height: 200px; background: radial-gradient(ellipse 80% 80% at 50% 90%, rgba(244,123,32,.16), #1a1714); display: flex; align-items: center; justify-content: center; overflow: hidden;\">\n            <span style=\"font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 50px; letter-spacing: .12em; color: transparent; -webkit-text-stroke: 1px rgba(244,123,32,.35); line-height: 1;\">PANTINA<\u002Fspan>\n            <span style=\"position: absolute; top: 14px; left: 16px; font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: rgba(245,243,239,.5); border: 1px solid rgba(255,255,255,.14); border-radius: 99px; padding: 5px 11px;\">Gập gọn mang đi<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding: 24px; display: flex; flex-direction: column; gap: 12px; flex: 1;\">\n            <h3 style=\"margin: 0; font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 22px; letter-spacing: .04em;\">PANTINA · LÒ TÁCH KHÓI GẬP GỌN<\u002Fh3>\n            <p style=\"margin: 0; font-size: 13.5px; line-height: 1.6; color: rgba(245,243,239,.58); text-wrap: pretty;\">Vỉ tách dầu chữ V hứng trọn mỡ, quạt sò gió cưỡng bức chạy nguồn DC 12V hoặc Type-C. Ống khói tháo rời, 4 chân gập sát đáy — gọn một thùng xe.<\u002Fp>\n            <div style=\"display: flex; flex-wrap: wrap; gap: 7px; margin-top: 2px;\">\n              <span style=\"font-size: 11px; font-weight: 600; color: #F47B20; background: rgba(244,123,32,.12); border: 1px solid rgba(244,123,32,.3); border-radius: 99px; padding: 4px 11px;\">4 kg / mẻ<\u002Fspan>\n              <span style=\"font-size: 11px; font-weight: 600; color: #F47B20; background: rgba(244,123,32,.12); border: 1px solid rgba(244,123,32,.3); border-radius: 99px; padding: 4px 11px;\">DC 12V · Type-C<\u002Fspan>\n              <span style=\"font-size: 11px; font-weight: 600; color: #F47B20; background: rgba(244,123,32,.12); border: 1px solid rgba(244,123,32,.3); border-radius: 99px; padding: 4px 11px;\">Gập gọn<\u002Fspan>\n            <\u002Fdiv>\n            <span style=\"margin-top: auto; padding-top: 8px; font-size: 13px; font-weight: 700; color: #F47B20;\">Xem chi tiết →<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fa>\n\n        <!-- OFFSET 10050 -->\n        <a href=\"sp-offset-10050.html\" style=\"text-decoration: none; color: inherit; background: #141417; border: 1px solid rgba(255,255,255,.1); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; transition: border-color .18s, transform .18s;\" style-hover=\"border-color: rgba(244,123,32,.55); transform: translateY(-3px);\">\n          <div style=\"position: rela u002Fspan>\n            <\u002Fdiv>\n            <span style=\"margin-top: auto; padding-top: 8px; font-size: 13px; font-weight: 700; color: #F47B20;\">Mở mô phỏng →<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fa>\n\n        <!-- THAN DUOC -->\n        <a href=\"#than-duoc\" style=\"text-decoration: none; color: inherit; background: #141417; border: 1px solid rgba(255,255,255,.1); border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; transition: border-color .18s, transform .18s;\" style-hover=\"border-color: rgba(244,123,32,.55); transform: translateY(-3px);\">\n          <div style=\"position: relative; height: 200px; background: radial-gradient(ellipse 80% 80% at 50% 90%, rgba(244,123,32,.2), #15110d); display: flex; align-items: center; justify-content: center; overflow: hidden;\">\n            <div style=\"display: flex; gap: 7px; align-items: flex-end;\">\n              <span style=\"width: 26px; height: 38px; border-radius: 6px; background: linear-gradient(180deg, #2a2622, #15110d); box-shadow: 0 0 14px 2px rgba(244,90,20,.4);\"><\u002Fspan>\n              <span style=\"width: 30px; height: 54px; border-radius: 6px; background: linear-gradient(180deg, #e2581d, #7a2a0c); box-shadow: 0 0 18px 4px rgba(244,90,20,.55);\"><\u002Fspan>\n              <span style=\"width: 24px; height: 44px; border-radius: 6px; background: linear-gradient(180deg, #2a2622, #15110d); box-shadow: 0 0 14px 2px rgba(244,90,20,.4);\"><\u002Fspan>\n            <\u002Fdiv>\n            <span style=\"position: absolute; top: 14px; left: 16px; font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: rgba(245,243,239,.5); border: 1px solid rgba(255,255,255,.14); border-radius: 99px; padding: 5px 11px;\">Nhiên liệu<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding: 24px; display: flex; flex-direction: column; gap: 12px; flex: 1;\">\n            <h3 style=\"margin: 0; font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 22px; letter-spacing: .04em;\">THAN ĐƯỚC VIỆT NAM<\u002Fh3>\n            <p style=\"margin: 0; font-size: 13.5px; line-height: 1.6; color: rgba(245,243,239,.58); text-wrap: pretty;\">Than đước miền Tây cháy lâu, nhiệt cao và ổn định, ít khói — lớp than nền lý tưởng giữ nhiệt giữa các lần thêm củi. Đóng bao 10kg, giao kèm lò.<\u002Fp>\n            <div style=\"display: flex; flex-wrap: wrap; gap: 7px; margin-top: 2px;\">\n              <span style=\"font-size: 11px; font-weight: 600; color: #F47B20; background: rgba(244,123,32,.12); border: 1px solid rgba(244,123,32,.3); border-radius: 99px; padding: 4px 11px;\">Bao 10 kg<\u002Fspan>\n              <span style=\"font-size: 11px; font-weight: 600; color: #F47B20; background: rgba(244,123,32,.12); border: 1px solid rgba(244,123,32,.3); border-radius: 99px; padding: 4px 11px;\">Nhiệt nền<\u002Fspan>\n              <span style=\"font-size: 11px; font-weight: 600; color: #F47B20; background: rgba(244,123,32,.12); border: 1px solid rgba(244,123,32,.3); border-radius: 99px; padding: 4px 11px;\">Ít khói<\u002Fspan>\n            <\u002Fdiv>\n            <span style=\"margin-top: auto; padding-top: 8px; font-size: 13px; font-weight: 700; color: #F47B20;\">Tìm hiểu →<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fa>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== CONG NGHE TACH KHOI (comparison) ===== -->\n  <section id=\"cong-nghe\" style=\"padding: clamp(64px, 9vw, 110px) clamp(20px, 5vw, 64px); background: #0A0A0B; border-top: 1px solid rgba(255,255,255,.07);\">\n    <div style=\"max-width: 1180px; margin: 0 auto; display: flex; flex-direction: column; gap: 40px;\">\n      <div style=\"display: flex; flex-direction: column; gap: 14px; max-width: 760px;\">\n        <span style=\"font-size: 11.5px; letter-spacing: .24em; text-transform: uppercase; color: #F47B20; font-weight: 700;\">Xem trực tiếp — không nói suông<\u002Fspan>\n        <h2 style=\"margin: 0; font-family: 'Oswald', sans-serif; font-weight: 600; font-size: clamp(29px, 4.4vw, 44px); line-height: 1.1; text-transform: uppercase;\">Lò thường vs Duy's Oven — cùng mẻ thịt, khác hẳn số phận<\u002Fh2>\n        <p style=\"margin: 0; font-size: 16px; line-height: 1.7; color: rgba(245,243,239,.62); text-wrap: pretty;\">Dõi theo từng giọt mỡ vàng rơi xuống: bên trái nó chạm than và bốc khói đen ám ngược lên thịt — bên Duy's Oven nó trượt qua khe giữa xuống khay hứng, sạch tuyệt đối.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 320px), 1fr)); gap: 20px;\">\n\n        <!-- LO THUONG -->\n        <div style=\"background: #141417; border: 1px solid rgba(255,255,255,.1); border-radius: 18px; overflow: hidden;\">\n          <div style=\"padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,.07); display: flex; align-items: center; justify-content: space-between;\">\n            <span style=\"font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 600; letter-spacing: .05em; color: #8a8580;\">LÒ THAN THƯỜNG<\u002Fspan>\n            <span style=\"font-size: 11px; font-weight: 700; color: #c0392b; letter-spacing: .04em;\">KHÓI ĐEN<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"position: relative; height: 300px; background: linear-gradient(180deg, #2a2622, #1a1714); overflow: hidden;\">\n            <span style=\"position: absolute; left: 38%; bottom: 150px; width: 26px; height: 26px; border-radius: 50%; background: rgba(20,20,22,.7); animation: sootUp 2.4s linear infinite;\"><\u002Fspan>\n            <span style=\"position: absolute; left: 52%; bottom: 150px; width: 30px; height: 30px; border-radius: 50%; background: rgba(20,20,22,.65); animation: sootUp 2.4s linear infinite; animation-delay: .9s;\"><\u002Fspan>\n            <span style=\"position: absolute; left: 46%; bottom: 150px; width: 22px; height: 22px; border-radius: 50%; background: rgba(20,20,22,.6); animation: sootUp 2.4s linear infinite; animation-delay: 1.6s;\"><\u002Fspan>\n            <div style=\"position: absolute; left: 50%; top: 96px; transform: translateX(-50%); width: 120px; height: 22px; border-radius: 11px; background: linear-gradient(180deg, #8a4434, #5e2a1f); z-index: 3;\"><\u002Fdiv>\n            <span style=\"position: absolute; left: 50%; top: 120px; width: 8px; height: 12px; border-radius: 50% 50% 60% 60%; background: #f2c14e; z-index: 4; animation: dripFallConv 1.1s ease-in infinite;\"><\u002Fspan>\n            <span style=\"position: absolute; left: 50%; bottom: 70px; transform: translateX(-50%); width: 40px; height: 50px; border-radius: 50% 50% 40% 40%; background: radial-gradient(circle at 50% 80%, #ffd24a, #f4661f 60%, transparent 75%); transform-origin: bottom center; animation: flameFlick .3s ease-in-out infinite alternate; z-index: 2;\"><\u002Fspan>\n            <div style=\"position: absolute; left: 12%; right: 12%; bottom: 56px; height: 18px; border-radius: 9px; background: linear-gradient(180deg, #e2581d, #7a2a0c); box-shadow: 0 0 18px 4px rgba(244,90,20,.5); z-index: 1;\"><\u002Fdiv>\n            <div style=\"position: absolute; left: 12%; right: 12%; bottom: 40px; height: 16px; background: #15110d;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding: 16px 20px;\">\n            <span style=\"font-size: 13.5px; line-height: 1.55; color: rgba(245,243,239,.7);\"><strong style=\"color: #c0392b;\">Mỡ rơi thẳng vào than<\u002Fstrong> → bùng lửa, khói đen ám lên thịt &amp; người nướng.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- DUY'S OVEN -->\n        <div style=\"background: #141417; border: 1.5px solid rgba(244,123,32,.5); border-radius: 18px; overflow: hidden; box-shadow: 0 8px 28px rgba(244,123,32,.12);\">\n          <div style=\"padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,.07); display: flex; align-items: center; justify-content: space-between;\">\n            <span style=\"font-family: 'Oswald', sans-serif; font-size: 16px;
