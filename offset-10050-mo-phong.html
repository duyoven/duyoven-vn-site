<title>Duy's Oven — Mô phỏng lò xông khói OFFSET 10050</title>
<link rel="preconnect" href="https://fonts.googleapis.com"></link>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"></link>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet"></link>
<meta name="ext-resource-dependency" content="smk-brisket.png" data-resource-id="photoBrisket"></meta>
<meta name="ext-resource-dependency" content="smk-suon-bo.png" data-resource-id="photoBeefribs"></meta>
<meta name="ext-resource-dependency" content="smk-suon-heo.png" data-resource-id="photoPorkribs"></meta>
<meta name="ext-resource-dependency" content="smk-ca-hoi.png" data-resource-id="photoSalmon"></meta>
<meta name="ext-resource-dependency" content="smk-vit.png" data-resource-id="photoDuck"></meta>
<style>
  :root {
    --accent: #ff7a2a;
    --bg: #0c0906;
    --card: #14100a;
    --card-edge: #2b2418;
    --ink: #ece5d8;
    --ink-dim: #9b9183;
    --ink-faint: #6f675a;
    --good: #4cc472;
    --warn: #e8a13c;
    --bad: #e25555;
    --mono: 'IBM Plex Mono', monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(1100px 500px at 75% -10%, rgba(255,122,42,0.07), transparent 60%),
      radial-gradient(800px 600px at -10% 105%, rgba(255,122,42,0.04), transparent 60%),
      var(--bg);
    color: var(--ink);
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }
  .page { max-width: 1480px; margin: 0 auto; padding: 22px 26px 30px; }

  /* ── masthead ── */
  .masthead { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; padding: 6px 4px 18px; border-bottom: 1px solid var(--card-edge); margin-bottom: 18px; flex-wrap: wrap; }
  .mast-kicker { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; white-space: nowrap; }
  .masthead h1 { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: clamp(26px, 3.6vw, 36px); line-height: 1.1; margin: 0; text-transform: uppercase; letter-spacing: 0.02em; white-space: nowrap; }
  .masthead h1 span { color: var(--accent); }
  .mast-spec { font-family: var(--mono); font-size: 11.5px; color: var(--ink-dim); text-align: right; max-width: 360px; line-height: 1.7; }
  .mast-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
  .lang-select { font-family: var(--mono); font-size: 12.5px; font-weight: 500; color: var(--ink); background: #1c160e; border: 1px solid var(--card-edge); border-radius: 7px; padding: 8px 10px; cursor: pointer; }
  .lang-select:hover { border-color: var(--accent); }
  html[lang="zh"] body, html[lang="zh"] h1, html[lang="zh"] h2, html[lang="zh"] h3, html[lang="zh"] .card-title { font-family: 'Noto Sans SC', sans-serif; }
  html[lang="ko"] body, html[lang="ko"] h1, html[lang="ko"] h2, html[lang="ko"] h3, html[lang="ko"] .card-title { font-family: 'Noto Sans KR', sans-serif; }
  html[lang="th"] body, html[lang="th"] h1, html[lang="th"] h2, html[lang="th"] h3, html[lang="th"] .card-title { font-family: 'Noto Sans Thai', sans-serif; }
  html[lang="zh"] .masthead h1, html[lang="ko"] .masthead h1, html[lang="th"] .masthead h1 { text-transform: none; }

  .back-btn { display: inline-block; font-family: var(--mono); font-size: 12px; color: var(--ink-dim); text-decoration: none; margin-bottom: 8px; padding: 5px 12px; border: 1px solid var(--card-edge); border-radius: 20px; transition: all 0.15s; }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }
  .meat-select { width: 100%; font-family: inherit; font-size: 14px; font-weight: 600; color: var(--ink); background: #1c160e; border: 1px solid var(--card-edge); border-radius: 8px; padding: 11px 12px; cursor: pointer; }
  .meat-select:hover { border-color: var(--accent); }
  .meat-anno { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 10px 0 8px; }
  .anno-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; background: #1a140c; border: 1px solid var(--card-edge); border-radius: 6px; padding: 6px 10px; }
  .anno-row .anno-k { font-size: 11px; color: var(--ink-faint); }
  .anno-row b { font-family: var(--mono); font-size: 13px; color: var(--accent); }
  .ctl-note { display: flex; gap: 8px; align-items: baseline; margin-top: 8px; font-size: 11.5px; color: var(--ink-dim); line-height: 1.5; background: rgba(76,196,114,0.07); border: 1px solid rgba(76,196,114,0.25); border-radius: 6px; padding: 8px 11px; }
  .ctl-note i { flex: none; width: 7px; height: 7px; border-radius: 50%; background: var(--good); transform: translateY(-1px); }
  .sched-row.char { background: rgba(255,122,42,0.05); }
  .sched-row.char .sched-time { color: #c98a4a; }

  /* ── layout ── */
  .layout { display: grid; grid-template-columns: minmax(0, 1fr) 372px; gap: 16px; align-items: start; }
  .col-main { display: flex; flex-direction: column; gap: 16px; min-width: 0; }
  .row-bottom { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 16px; align-items: stretch; }
  @media (max-width: 1240px) and (min-width: 1021px) {
    .layout { grid-template-columns: minmax(0, 1fr) 330px; }
    .row-bottom { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 1020px) {
    .layout { grid-template-columns: 1fr; }
    .row-bottom { grid-template-columns: 1fr 1fr; }
    .mast-spec { text-align: left; }
    .mast-right { align-items: flex-start; }
  }
  @media (max-width: 720px) {
    .row-bottom { grid-template-columns: 1fr; }
  }

  /* ── cards ── */
  .card { background: var(--card); border: 1px solid var(--card-edge); border-radius: 10px; padding: 16px 18px; }
  .card-kicker { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.13em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
  .card-title { font-family: 'Oswald', sans-serif; font-weight: 500; font-size: 19px; margin: 0 0 12px; letter-spacing: 0.01em; }
  .card-smoker { padding-bottom: 12px; }

  /* ── SVG labels ── */
  .sv-tiny { font-family: var(--mono); font-size: 10px; }
  .sv-dim  { font-family: var(--mono); font-size: 11px; fill: var(--accent); }
  .sv-zone { font-family: var(--mono); font-size: 13px; font-weight: 600; }
  .sv-pit  { font-family: var(--mono); font-size: 16px; font-weight: 600; fill: var(--ink); }
  .sv-probe { font-family: var(--mono); font-size: 11px; font-weight: 600; fill: #ffd9b3; }
  .sv-badge { font-family: 'Oswald', sans-serif; font-size: 8.5px; font-weight: 600; letter-spacing: 0.12em; fill: #2b241c; }
  .flicker { animation: flick 0.9s ease-in-out infinite alternate; transform-origin: center; }
  @keyframes flick { from { opacity: 0.75; } to { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) { .flicker { animation: none; } }

  /* ── controls ── */
  .ctl-row { margin-bottom: 15px; }
  .ctl-row:last-child { margin-bottom: 4px; }
  .ctl-label-line { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 6px; }
  .ctl-label-line label { font-weight: 600; font-size: 13px; }
  .ctl-value { font-family: var(--mono); font-size: 12.5px; color: var(--accent); }
  .ctl-hint { font-size: 11.5px; color: var(--ink-dim); margin-top: 5px; line-height: 1.45; }
  input[type="range"] { width: 100%; appearance: none; -webkit-appearance: none; height: 4px; border-radius: 2px; background: #2e2317; outline: none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); border: 2px solid #1a120a; cursor: pointer; }
  input[type="range"]::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: var(--accent); border: 2px solid #1a120a; cursor: pointer; }

  .seg { display: flex; gap: 6px; flex-wrap: wrap; }
  .seg-btn { flex: 1; min-width: 0; background: #1c160e; border: 1px solid var(--card-edge); color: var(--ink-dim); font-family: inherit; font-size: 12px; padding: 7px 8px; border-radius: 6px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .seg-btn:hover { border-color: #463a28; color: var(--ink); }
  .seg-btn.on { background: rgba(255,122,42,0.12); border-color: var(--accent); color: var(--accent); font-weight: 600; }

  .meat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .meat-btn { display: flex; flex-direction: column; gap: 2px; align-items: flex-start; background: #1c160e; border: 1px solid var(--card-edge); border-radius: 7px; padding: 8px 10px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .meat-btn:hover { border-color: #463a28; }
  .meat-btn.on { background: rgba(255,122,42,0.12); border-color: var(--accent); }
  .meat-btn-name { font-weight: 700; font-size: 12.5px; color: var(--ink); }
  .meat-btn.on .meat-btn-name { color: var(--accent); }
  .meat-btn-sub { font-family: var(--mono); font-size: 9.5px; color: var(--ink-faint); }

  .stepper { display: flex; align-items: center; gap: 14px; }
  .stepper button { width: 32px; height: 32px; border-radius: 7px; background: #1c160e; border: 1px solid var(--card-edge); color: var(--ink); font-size: 17px; cursor: pointer; }
  .stepper button:hover { border-color: var(--accent); color: var(--accent); }
  .stepper span { font-family: var(--mono); font-size: 16px; font-weight: 600; min-width: 22px; text-align: center; }

  .toggle { position: relative; width: 40px; height: 22px; border-radius: 11px; background: #2e2317; border: 1px solid var(--card-edge); cursor: pointer; transition: background 0.2s; padding: 0; }
  .toggle .knob { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: var(--ink-dim); transition: all 0.2s; }
  .toggle.on { background: rgba(255,122,42,0.3); border-color: var(--accent); }
  .toggle.on .knob { left: 20px; background: var(--accent); }

  /* ── transport ── */
  .transport { display: flex; align-items: center; gap: 12px; padding: 10px 4px 4px; border-top: 1px solid var(--card-edge); margin-top: 8px; }
  .play-btn { width: 38px; height: 38px; flex: none; border-radius: 50%; background: var(--accent); color: #160c04; border: none; cursor: pointer; display: grid; place-items: center; }
  .play-btn:hover { filter: brightness(1.1); }
  .clock { font-family: var(--mono); font-size: 19px; font-weight: 600; min-width: 108px; }
  .clock small { font-size: 11px; color: var(--ink-faint); font-weight: 400; }
  .scrub { flex: 1; }
  .speed-seg { display: flex; gap: 4px; flex: none; }
  .speed-seg button { background: #1c160e; border: 1px solid var(--card-edge); color: var(--ink-dim); font-family: var(--mono); font-size: 10.5px; padding: 5px 9px; border-radius: 5px; cursor: pointer; }
  .speed-seg button.on { border-color: var(--accent); color: var(--accent); }
  .icon-btn { width: 34px; height: 34px; flex: none; border-radius: 7px; background: #1c160e; border: 1px solid var(--card-edge); color: var(--ink-dim); cursor: pointer; display: grid; place-items: center; }
  .icon-btn:hover { border-color: #463a28; color: var(--ink); }
  .icon-btn.on { border-color: var(--accent); color: var(--accent); background: rgba(255,122,42,0.10); }
  .guide-btn { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,122,42,0.10); border: 1px solid var(--accent); color: var(--accent); font-family: inherit; font-size: 12.5px; font-weight: 600; padding: 8px 14px; border-radius: 7px; cursor: pointer; margin-top: 8px; }
  .guide-btn:hover { background: rgba(255,122,42,0.18); }
  .sched-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .sched-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .voice-select { flex: none; max-width: 150px; background: #1c160e; border: 1px solid var(--card-edge); color: var(--ink-dim); font-family: var(--mono); font-size: 10.5px; padding: 8px 6px; border-radius: 5px; cursor: pointer; }
  .voice-select:hover { border-color: #463a28; color: var(--ink); }
  @media (pointer: coarse) { .icon-btn { width: 44px; height: 44px; } }

  /* ── tips ── */
  .tips { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
  .tip { display: flex; gap: 9px; align-items: baseline; font-size: 12.5px; padding: 7px 11px; border-radius: 6px; background: #1a140c; border: 1px solid var(--card-edge); }
  .tip i { flex: none; width: 8px; height: 8px; border-radius: 50%; transform: translateY(-1px); }
  .tip-good i { background: var(--good); } .tip-good { border-color: rgba(76,196,114,0.35); }
  .tip-warn i { background: var(--warn); } .tip-warn { border-color: rgba(232,161,60,0.35); }
  .tip-bad i { background: var(--bad); } .tip-bad { border-color: rgba(226,85,85,0.4); }
  .tip-info i { background: #6aa3d8; }

  /* ── meat card ── */
  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin: 10px 0 12px; font-size: 11.5px; color: var(--ink-dim); }
  .legend i { display: inline-block; width: 11px; height: 11px; border-radius: 3px; margin-right: 5px; vertical-align: -1.5px; border: 1px solid rgba(255,255,255,0.15); }
  .meat-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
  .meat-stats > div { background: #1a140c; border: 1px solid var(--card-edge); border-radius: 7px; padding: 8px 10px; }
  .meat-stats b { display: block; font-family: var(--mono); font-size: 17px; color: var(--ink); }
  .meat-stats span { font-size: 10.5px; color: var(--ink-faint); }
  .verdict { border: 1px solid; border-radius: 8px; padding: 10px 13px; background: #100d08; }
  .verdict b { font-family: 'Oswald', sans-serif; font-size: 15px; letter-spacing: 0.04em; text-transform: uppercase; }
  .verdict p { margin: 4px 0 0; font-size: 12.5px; color: var(--ink-dim); }

  /* ── fuel ── */
  .fuel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .fuel-item { background: #1a140c; border: 1px solid var(--card-edge); border-radius: 8px; padding: 12px; }
  .fuel-num { font-family: var(--mono); font-size: 26px; font-weight: 600; color: var(--accent); line-height: 1; }
  .fuel-num small { font-size: 12px; color: var(--ink-dim); font-weight: 400; }
  .fuel-name { font-weight: 700; font-size: 12.5px; margin-top: 6px; }
  .fuel-sub { font-size: 10.5px; color: var(--ink-faint); margin-top: 3px; line-height: 1.45; }

  /* ── schedule ── */
  .card-sched { display: flex; flex-direction: column; }
  .sched-list { max-height: 330px; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; padding-right: 6px; scrollbar-width: thin; scrollbar-color: #3a3022 transparent; }
  .sched-row { display: flex; gap: 12px; padding: 7px 10px; border-radius: 6px; border-left: 2px solid transparent; font-size: 12.5px; color: var(--ink-dim); }
  .sched-row.minor { opacity: 0.75; }
  .sched-row.past { color: var(--ink-faint); }
  .sched-row.now { background: rgba(255,122,42,0.10); border-left-color: var(--accent); color: var(--ink); opacity: 1; }
  .sched-time { font-family: var(--mono); font-weight: 600; min-width: 42px; color: var(--accent); flex: none; }
  .sched-row.past .sched-time { color: var(--ink-faint); }
  .sched-row.now .sched-time { color: var(--accent); }

  .chart-tick { font-family: var(--mono); font-size: 9.5px; fill: var(--ink-faint); }

  .foot { margin-top: 22px; padding-top: 14px; border-top: 1px solid var(--card-edge); font-size: 11px; color: var(--ink-faint); font-family: var(--mono); text-align: center; }

  /* ── mobile ── */
  @media (max-width: 640px) {
    .page { padding: 14px 13px 24px; }
    .masthead { padding-bottom: 14px; margin-bottom: 14px; gap: 10px; }
    .mast-kicker { white-space: normal; font-size: 10px; }
    .masthead h1 { white-space: normal; font-size: clamp(24px, 7.5vw, 30px); }
    .mast-spec { max-width: none; font-size: 10.5px; }
    .card { padding: 13px 14px; }
    .meat-grid { grid-template-columns: repeat(2, 1fr); }
    .fuel-grid { grid-template-columns: 1fr; gap: 8px; }
    .fuel-item { display: grid; grid-template-columns: 96px 1fr; column-gap: 12px; align-items: center; }
    .fuel-item .fuel-name { margin-top: 0; grid-column: 2; }
    .fuel-item .fuel-sub { grid-column: 2; }
    .fuel-item .fuel-num { grid-row: 1 / span 2; align-self: center; }
    .transport { flex-wrap: wrap; row-gap: 8px; }
    .scrub { flex-basis: 100%; order: 9; }
    .clock { font-size: 17px; min-width: 0; }
    .seg { flex-direction: column; }
    .seg-btn { text-align: left; }
    .meat-stats { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .meat-stats b { font-size: 14px; }
    .sched-list { max-height: 270px; }
  }

  /* ── cảm ứng: mục tiêu chạm ≥ 44px ── */
  @media (pointer: coarse) {
    input[type="range"] { height: 6px; padding: 14px 0; background-clip: content-box; }
    input[type="range"]::-webkit-slider-thumb { width: 24px; height: 24px; }
    input[type="range"]::-moz-range-thumb { width: 22px; height: 22px; }
    .seg-btn { padding: 12px 12px; font-size: 13px; }
    .meat-btn { padding: 11px 12px; }
    .stepper button { width: 44px; height: 44px; border-radius: 9px; }
    .play-btn { width: 46px; height: 46px; }
    .speed-seg button { padding: 10px 12px; }
    .toggle { width: 50px; height: 28px; border-radius: 14px; }
    .toggle .knob { width: 22px; height: 22px; }
    .toggle.on .knob { left: 24px; }
  }
</style>
