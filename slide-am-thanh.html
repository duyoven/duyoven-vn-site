<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex,nofollow" />
<title>Slide bảo vệ đề án — Nhãn hiệu âm thanh · Nguyễn Phú Thành</title>
<style>
:root{--navy:#1E2761;--ink:#22293F;--ice:#CADCFC;--violet:#8B5CF6;--pink:#EC4899;
  --light:#F4F6FB;--green:#169C5B;--red:#C03A2B;--gold:#D9A406;--muted:#6B7280;--line:#dbe2f0}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:#0b1020;font-family:'Segoe UI',system-ui,Arial,sans-serif;overflow:hidden}
.deckwrap{position:fixed;inset:0}
.stage{position:absolute;left:50%;top:50%;width:1280px;height:720px;transform-origin:center center;
  border-radius:18px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.55)}
.slide{position:absolute;inset:0;padding:52px 60px;background:var(--light);color:var(--ink);
  opacity:0;transition:opacity .28s ease;display:flex;flex-direction:column}
.slide.active{opacity:1;z-index:2}
.slide.dark{background:var(--navy);color:#fff}
.deco{position:absolute;color:#354082;font-family:Cambria,Georgia,serif;pointer-events:none}
.kick{font-size:15px;font-weight:800;letter-spacing:.06em;color:var(--violet);text-transform:uppercase;margin-bottom:4px}
.slide.dark .kick{color:var(--ice)}
.s-title{font-family:Cambria,Georgia,serif;font-size:38px;font-weight:700;color:var(--navy);margin:2px 0 14px;line-height:1.12}
.slide.dark .s-title{color:#fff}
.s-sub{font-size:16px;color:var(--ink);margin:-6px 0 16px}
.slide.dark .s-sub{color:var(--ice)}
/* title slide */
.tw{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px}
.tw .logo{height:96px;margin-bottom:6px}
.t-kick{font-size:16px;font-weight:800;letter-spacing:.05em;color:var(--ice)}
.t-main{font-family:Cambria,Georgia,serif;font-size:34px;font-weight:700;color:#fff;line-height:1.22;margin:8px 0}
.t-main span{color:#C9B6FD}
.t-code{display:inline-block;background:var(--violet);color:#fff;font-weight:700;font-size:14px;padding:7px 20px;border-radius:99px;margin:6px 0}
.t-meta{font-size:15px;color:var(--ice);line-height:1.6}
.t-meta b{color:#fff}
/* cards 2x2 */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:18px;flex:1;align-content:center}
.card{background:#fff;border-radius:16px;padding:18px 22px;box-shadow:0 12px 30px rgba(30,39,97,.12);display:flex;gap:14px}
.card .ic{width:52px;height:52px;flex:none;border-radius:12px;background:var(--ice);display:flex;align-items:center;justify-content:center;font-size:24px}
.card h3{font-family:Cambria,Georgia,serif;color:var(--navy);font-size:19px;margin:2px 0 5px}
.card p{font-size:14.5px;line-height:1.45;margin:0;color:var(--ink)}
/* columns 3 */
.cols{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;flex:1;align-content:center}
.col{background:#fff;border-radius:16px;padding:22px 18px;box-shadow:0 12px 30px rgba(30,39,97,.1);text-align:center}
.col .num{width:60px;height:60px;border-radius:14px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;
  font-family:Cambria;font-size:28px;font-weight:700;color:#fff}
.col .ct{font-size:12px;font-weight:800;letter-spacing:.05em}
.col h3{font-family:Cambria;color:var(--navy);font-size:17px;margin:3px 0 9px}
.col p{font-size:13.5px;line-height:1.45;color:var(--ink);margin:0}
/* feats 3 + band */
.feats{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:4px}
.feat{background:#fff;border-radius:16px;padding:18px;box-shadow:0 12px 28px rgba(30,39,97,.1)}
.feat .ic{font-size:26px}
.feat h4{font-family:Cambria;color:var(--navy);font-size:16px;margin:8px 0 6px}
.feat p{font-size:13px;line-height:1.45;margin:0;color:var(--ink)}
.band{margin-top:auto;background:var(--navy);border-radius:14px;padding:16px 22px;font-size:15px;color:#fff;line-height:1.5}
.band b{color:var(--ice)}
/* two boxes */
.two{display:grid;grid-template-columns:1fr 1fr;gap:18px;flex:1;align-content:start;margin-top:4px}
.panel{border-radius:16px;padding:20px 22px;box-shadow:0 12px 30px rgba(30,39,97,.1)}
.panel.lite{background:#fff}
.panel.nv{background:var(--navy);color:#fff}
.panel h3{font-family:Cambria;font-size:19px;margin:0 0 12px}
.panel.lite h3{color:var(--navy)}
.b{list-style:none;margin:0;padding:0}
.b li{position:relative;padding-left:20px;margin-bottom:11px;font-size:14px;line-height:1.45}
.b li:before{content:"•";position:absolute;left:0;font-weight:800;color:var(--violet)}
.panel.nv .b li:before{color:#C9B6FD}
.b li b{font-weight:700}
.panel.lite .b li b{color:var(--navy)}
/* 7 groups */
.g7{display:flex;flex-direction:column;gap:6px;width:62%}
.g7row{display:flex;align-items:center;gap:12px;background:var(--light);border-radius:10px;padding:7px 12px}
.g7row.ok{background:#EAF7EF}
.g7row .num{width:26px;height:26px;flex:none;border-radius:7px;background:var(--muted);color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
.g7row.ok .num{background:var(--green)}
.g7row .d{flex:1;font-size:14px}
.g7row .v{font-weight:700;font-size:14px}
.g7row.ok .v{color:var(--green)}.g7row.no .v{color:var(--red)}
.princ{position:absolute;right:60px;top:150px;width:300px;background:var(--navy);border-radius:16px;padding:20px;color:#fff}
.princ h3{font-family:Cambria;color:var(--ice);font-size:17px;margin:0 0 12px}
/* tools 2x2 */
.tools{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:6px}
.tool{background:var(--light);border-radius:14px;padding:16px 18px;display:flex;gap:14px}
.tool .ic{width:50px;height:50px;flex:none;border-radius:12px;background:var(--violet);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px}
.tool h4{font-family:Cambria;color:var(--navy);font-size:16px;margin:2px 0 5px}
.tool p{font-size:13px;line-height:1.4;margin:0;color:var(--ink)}
/* conclusion */
.concl{margin-top:6px}
.concl .b li{font-size:16px;margin-bottom:15px}
.thank{margin-top:auto;background:#161C42;border-radius:14px;padding:15px;text-align:center;font-size:15px;color:var(--ice)}
.thank b{color:#fff}
.cases .v{font-weight:700;color:var(--navy)}
/* chrome */
.bar{position:fixed;z-index:30;display:flex;gap:6px;align-items:center}
.bar.tl{top:14px;left:14px}.bar.tr{top:14px;right:14px}
.bar a,.bar button{background:rgba(22,31,61,.9);border:1px solid #2a3866;color:#c4b5fd;font-size:13px;font-weight:700;
  padding:7px 13px;border-radius:99px;cursor:pointer;text-decoration:none}
.bar button.on{background:linear-gradient(90deg,#8b5cf6,#ec4899);color:#fff;border-color:transparent}
.nav{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:30;display:flex;align-items:center;gap:14px}
.nav button{width:42px;height:42px;border-radius:50%;border:1px solid #2a3866;background:rgba(22,31,61,.9);color:#fff;font-size:18px;cursor:pointer}
.nav button:active{transform:scale(.94)}
.dots{display:flex;gap:7px}
.dot{width:9px;height:9px;border-radius:50%;background:#39456f;cursor:pointer}
.dot.on{background:#ec4899;transform:scale(1.25)}
.count{color:#9aa6c8;font-size:13px;min-width:46px;text-align:center}
.hint{position:fixed;bottom:16px;right:16px;color:#5b6890;font-size:12px;z-index:30}
@media (max-width:900px){.hint{display:none}}
/* gate */
body.locked{overflow:hidden}
body.locked .deckwrap,body.locked .bar,body.locked .nav,body.locked .hint{display:none}
#gate{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(1000px 600px at 70% -10%, rgba(139,92,246,.25), transparent), #0b1020}
body:not(.locked) #gate{display:none}
.gate-card{width:100%;max-width:380px;background:linear-gradient(180deg,#161f3d,#111935);
  border:1px solid #2a3866;border-radius:20px;padding:34px 28px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.gate-ic{font-size:44px}.gate-title{font-size:22px;margin:8px 0 4px;color:#eef2ff}
.gate-sub{color:#9aa6c8;font-size:14px;margin:0 0 20px}
.gate-input{width:100%;padding:13px 15px;border-radius:12px;border:1px solid #2a3866;background:#0c1330;
  color:#eef2ff;font-size:16px;outline:none;text-align:center;letter-spacing:.12em}
.gate-input:focus{border-color:#8b5cf6}
.gate-btn{width:100%;margin-top:14px;padding:13px;border:none;border-radius:12px;cursor:pointer;
  font-size:15px;font-weight:700;color:#fff;background:linear-gradient(90deg,#8b5cf6,#ec4899)}
.gate-err{color:#fca5a5;font-size:13.5px;min-height:20px;margin-top:12px}
.gate-card.shake{animation:shk .4s}@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.gate-back{display:inline-block;margin-top:8px;color:#9aa6c8;font-size:13px;text-decoration:none}
</style>
</head>
<body class="locked">

<div id="gate" role="dialog" aria-modal="true">
  <form class="gate-card" id="gateForm" autocomplete="off">
    <div class="gate-ic">🔒</div>
    <h1 class="gate-title">Khu vực có mật khẩu</h1>
    <p class="gate-sub">Nhập mật khẩu để xem slide bảo vệ đề án.</p>
    <input id="gatePw" type="password" class="gate-input" placeholder="Mật khẩu" autocomplete="off" />
    <button type="submit" class="gate-btn">Xem slide →</button>
    <div id="gateErr" class="gate-err"></div>
    <a class="gate-back" href="https://duyoven.vn">← Về duyoven.vn</a>
  </form>
</div>

<div class="bar tl">
  <a href="am-thanh" title="Mở ứng dụng phân loại âm thanh">← <span data-en="App">Ứng dụng</span></a>
</div>
<div class="bar tr">
  <button id="lvi" data-lang="vi" class="on">VI</button>
  <button id="len" data-lang="en">EN</button>
  <button id="fs" title="Toàn màn hình">⛶</button>
</div>

<div class="deckwrap"><div class="stage" id="stage"><div class="slide" id="slide"></div></div></div>

<div class="nav">
  <button id="prev" aria-label="Trước">‹</button>
  <div class="dots" id="dots"></div>
  <button id="next" aria-label="Sau">›</button>
  <span class="count" id="count">1 / 10</span>
</div>
<div class="hint" data-en="← → arrows · F fullscreen">← → chuyển slide · F toàn màn hình</div>

<script>
(function(){
  // ---------- gate ----------
  var HASH="8ca66aacbc85bae5ec4c12f0998d55d156ade64c221c3ce6e214b68d4f8baac7", KEY="amthanh_unlocked";
  function unlock(){ document.body.classList.remove('locked'); fit(); }
  try{ if(sessionStorage.getItem(KEY)===HASH) document.body.classList.remove('locked'); }catch(e){}
  async function sha256(s){ var b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
    return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0')}).join(''); }
  document.getElementById('gateForm').addEventListener('submit', async function(e){
    e.preventDefault();
    var h=await sha256(document.getElementById('gatePw').value);
    if(h===HASH){ try{sessionStorage.setItem(KEY,HASH)}catch(e){} unlock(); }
    else{ document.getElementById('gateErr').textContent='Sai mật khẩu, thử lại.';
      var c=document.querySelector('.gate-card'); c.classList.remove('shake'); void c.offsetWidth; c.classList.add('shake');

  {vi:
    '<div class="kick">CHƯƠNG 1 · ĐIỀU KIỆN & QUỐC TẾ</div><div class="s-title">Điều kiện bảo hộ & kinh nghiệm quốc tế</div>'+
    '<div class="two">'+
    '<div class="panel lite"><h3>✅ 3 điều kiện bảo hộ</h3><ul class="b">'+
      '<li><b>Thể hiện đồ họa</b> — khuông nhạc 5 dòng + .mp3 ≤5MB (Đ.72, Đ.105)</li>'+
      '<li><b>Khả năng phân biệt</b> — cố hữu HOẶC “ý nghĩa thứ hai” (Đ.74.2 b–e)</li>'+
      '<li><b>Không loại trừ</b> — Quốc ca (Đ.73.1), trật tự/đạo đức (Đ.8), đặc tính kỹ thuật bắt buộc (Đ.73.6)</li></ul></div>'+
    '<div class="panel nv"><h3>🌍 Kinh nghiệm quốc tế</h3><ul class="b">'+
      '<li><b>Hoa Kỳ (USPTO):</b> Lanham §2(f) secondary meaning; mã Category 30; NBC, MGM, Intel, Nokia.</li>'+
      '<li><b>EU (EUIPO):</b> bỏ yêu cầu đồ họa từ 01/10/2017 — chỉ cần .mp3; >500 nhãn hiệu.</li>'+
      '<li><b>WIPO/TRIPS:</b> Đ.15 “bất kỳ dấu hiệu nào”; Nhật: Hisamitsu.</li>'+
      '<li><b>Bài học VN:</b> công nhận Spectrogram/Waveform; bộ phận chuyên trách; mã phân loại riêng.</li></ul></div></div>',
   en:
    '<div class="kick">CHAPTER 1 · CONDITIONS & INTERNATIONAL</div><div class="s-title">Conditions for protection & global experience</div>'+
    '<div class="two">'+
    '<div class="panel lite"><h3>✅ Three conditions</h3><ul class="b">'+
      '<li><b>Graphic representation</b> — 5-line staff + .mp3 ≤5MB (Art. 72, Art. 105)</li>'+
      '<li><b>Distinctiveness</b> — inherent OR “secondary meaning” (Art. 74(2) b–e)</li>'+
      '<li><b>Not excluded</b> — national anthem (Art. 73(1)), public order/morality (Art. 8), mandatory technical feature (Art. 73(6))</li></ul></div>'+
    '<div class="panel nv"><h3>🌍 International experience</h3><ul class="b">'+
      '<li><b>US (USPTO):</b> Lanham §2(f) secondary meaning; Category 30; NBC, MGM, Intel, Nokia.</li>'+
      '<li><b>EU (EUIPO):</b> graphic requirement dropped since 1 Oct 2017 — only an .mp3; >500 marks.</li>'+
      '<li><b>WIPO/TRIPS:</b> Art. 15 “any sign”; Japan: Hisamitsu.</li>'+
      '<li><b>Lessons for VN:</b> accept Spectrogram/Waveform; a dedicated unit; a dedicated code.</li></ul></div></div>'},

    '<div class="kick">CHAPTER 2 · STATUS IN HCMC</div><div class="s-title">“Law on the books, hard to enforce”</div>'+
    '<div class="two">'+
    '<div class="panel lite"><h3>📄 Notable applications in HCMC</h3><ul class="b cases">'+
      '<li><b>Shopee</b> — VN-4-2023-00001 · <span class="v" style="color:#169C5B">granted</span></li>'+
      '<li><b>Tiki</b> — VN-4-2023-00216 · <span class="v" style="color:#D9A406">under examination</span></li>'+
      '<li><b>Samsung</b> — VN-4-2023-01814 · startup sound</li>'+

    '<div class="band"><b>Consequence:</b> sound marks become a “playground” for tech corporations/FDI; HCMC’s SMEs are left behind, even at risk of losing rights over their own familiar advertising sounds.</div>'},

    '<div class="kick">CHƯƠNG 3 · ĐÓNG GÓP CỐT LÕI</div><div class="s-title">⭐ Hệ thống phân loại 7 nhóm âm thanh</div>'+
    '<div class="g7">'+g7([["1","Phi sinh học (gió, nước, sấm)",0],["2","Sinh vật sống (chim, thú, côn trùng)",0],["3","Môi trường tổng hợp",0],["4","Con người (nói, hát, cười)",1],["5","Mô phỏng tự nhiên",0],["6","Vật dụng / sản phẩm",0],["7","Tổng hợp toàn phần (AI/số, giai điệu)",1]])+'</div>'+

   en:
    '<div class="kick">CHAPTER 3 · CORE CONTRIBUTION</div><div class="s-title">⭐ The 7-group sound classification system</div>'+
    '<div class="g7">'+g7([["1","Abiotic (wind, water, thunder)",0],["2","Living organisms (birds, animals, insects)",0],["3","Composite environment",0],["4","Human (speech, singing, laughter)",1],["5","Nature simulation",0],["6","Objects / products",0],["7","Fully synthesized (AI/digital, melody)",1]])+'</div>'+

      '<li>Favor groups [4] & [7]</li><li>Creative/melodic combinations → accepted</li>'+
      '<li>Reject [1][2][3][5][6] alone if lacking creativity</li><li>Encourage creative simulation → convert to [7]</li></ul></div>'},

  function feat(ic,h,b){ return '<div class="feat"><div class="ic">'+ic+'</div><h4>'+h+'</h4><p>'+b+'</p></div>'; }

  try{ var sv=localStorage.getItem('amthanh_lang'); if(sv) lang=sv; }catch(e){}
  var slide=document.getElementById('slide'), dotsEl=document.getElementById('dots');
  for(var i=0;i<S.length;i++){ var d=document.createElement('span'); d.className='dot'; d.setAttribute('data-i',i); dotsEl.appendChild(d); }
  var dots=dotsEl.querySelectorAll('.dot');

  function render(){
    var s=S[idx];
    slide.className='slide active'+(s.dark?' dark':'');
    slide.innerHTML=s[lang];
    document.getElementById('count').textContent=(idx+1)+' / '+S.length;
    for(var i=0;i<dots.length;i++) dots[i].classList.toggle('on',i===idx);
    // static chrome (data-en)
    Array.prototype.forEach.call(document.querySelectorAll('[data-en]'),function(el){
      if(el.__vi==null) el.__vi=el.innerHTML;
      el.innerHTML=(lang==='en')?el.getAttribute('data-en'):el.__vi;
    });
    document.documentElement.setAttribute('lang',lang);
    document.getElementById('lvi').classList.toggle('on',lang==='vi');
    document.getElementById('len').classList.toggle('on',lang==='en');
  }
  function go(n){ idx=Math.max(0,Math.min(S.length-1,n)); render(); }

  document.getElementById('next').onclick=function(){go(idx+1)};
  document.getElementById('prev').onclick=function(){go(idx-1)};
  dotsEl.onclick=function(e){ var d=e.target.closest('.dot'); if(d) go(+d.getAttribute('data-i')); };
  document.querySelector('.bar.tr').addEventListener('click',function(e){
    var b=e.target.closest('[data-lang]'); if(b){ lang=b.getAttribute('data-lang'); try{localStorage.setItem('amthanh_lang',lang)}catch(e){} render(); }
  });
  document.getElementById('fs').onclick=function(){ if(!document.fullscreenElement){ (document.documentElement.requestFullscreen||function(){})(); } else { document.exitFullscreen(); } setTimeout(fit,120); };
  document.addEventListener('keydown',function(e){
    if(document.body.classList.contains('locked')) return;
    if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){ e.preventDefault(); go(idx+1); }
    else if(e.key==='ArrowLeft'||e.key==='PageUp'){ e.preventDefault(); go(idx-1); }
    else if(e.key==='Home'){ go(0); } else if(e.key==='End'){ go(S.length-1); }
    else if(e.key==='f'||e.key==='F'){ document.getElementById('fs').click(); }
  });
  var tx=0; window.addEventListener('touchstart',function(e){ tx=e.changedTouches[0].clientX; },{passive:true});
  window.addEventListener('touchend',function(e){ var dx=e.changedTouches[0].clientX-tx; if(Math.abs(dx)>50){ go(idx+(dx<0?1:-1)); } },{passive:true});

  // ---------- fit 1280x720 to viewport ----------
  function fit(){
    var vw=window.innerWidth||document.documentElement.clientWidth||1280;
    var vh=window.innerHeight||document.documentElement.clientHeight||720;
    var k=Math.min(vw/1280, vh/720)*0.96; if(!(k>0)) k=1;
    document.getElementById('stage').style.transform='translate(-50%,-50%) scale('+k+')'; }
  window.addEventListener('resize',fit);
  fit(); render();
})();
</script>
</body>
</html>
